<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SM Technology</title>
    <link rel="stylesheet" href="style.css">
    <!-- FONT  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- NAVBAR  -->
    <nav>
        <div class="container nav-wrapper">
            <div class="logo">
                <img src="assets/logo.png" alt="Logo">
            </div>

            <div class="nav-right">
                <ul class="nav-links">
                    <li><a href="#" class="active">Services</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
                <a href="#" class="btn-cta">Book a Free Consultation</a>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT  -->
    <main>
        <!-- BANNER SECTION  -->
        <section class="banner-section">
            <div class="container banner-container">

                <div class="floating-img income-card">
                    <img src="assets/total-incomes.png" alt="Total Incomes">
                </div>

                <div class="banner-content">
                    <div class="partner-badge">
                        <img src="assets/amazon.png" alt="Amazon">
                        <span>Your Full-Service <span class="text-primary">Amazon Partner</span></span>
                    </div>

                    <h1 class="hero-title">
                        Turn Your Amazon Struggles into Success—Save Time,
                        <span class="highlight-text">Maximize Profits!</span>
                    </h1>

                    <a href="#" class="btn-cta">Book a Free Consultation</a>
                </div>

                <div class="floating-card user-rating-card">
                    <div class="user-avatars">
                        <img src="assets/third-person.png" alt="User">
                        <img src="assets/second-person.png" alt="User">
                        <img src="assets/first-person.png" alt="User">
                    </div>
                    <div class="user-stats">
                        <p class="count">45k+ Users</p>
                        <p class="rating"><span>★</span> 4.7 Rating</p>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <!-- FOOTER SECTION  -->
    <footer>

    </footer>
</body>

</html>
